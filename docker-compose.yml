services:
  app:
    build: .
    container_name: maps_lead_api
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: maps_lead_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: maps_user
      POSTGRES_PASSWORD: maps_password
      POSTGRES_DB: maps_leads
    ports:
      - "5432:5432"
    volumes:
      - maps_lead_pg_data:/var/lib/postgresql/data

volumes:
  maps_lead_pg_data:
  